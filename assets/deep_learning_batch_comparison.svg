<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Full batch, SGD, mini-batch 비교</title>
  <desc id="desc">같은 dataset에서 각 방식이 한 번의 gradient 계산에 선택하는 sample 수를 비교한다.</desc>
  <defs>
    <style>
      .title{font:700 30px Arial,'Noto Sans KR',sans-serif;fill:#172033}.sub{font:400 16px Arial,'Noto Sans KR',sans-serif;fill:#667085}.head{font:700 23px Arial,'Noto Sans KR',sans-serif;fill:#172033}.body{font:400 16px Arial,'Noto Sans KR',sans-serif;fill:#475467}.formula{font:600 18px Georgia,serif;fill:#344054}.card{fill:#fff;stroke:#d0d5dd;stroke-width:2}.dot{fill:#e4e7ec;stroke:#98a2b3;stroke-width:1.5}.full{fill:#667eea;stroke:#4f46c7}.sgd{fill:#ef8354;stroke:#c6532a}.mini{fill:#22a699;stroke:#137f75}.arrow{fill:none;stroke:#98a2b3;stroke-width:3;marker-end:url(#tip)}
    </style>
    <marker id="tip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#98a2b3"/></marker>
    <g id="grid">
      <circle class="dot" cx="0" cy="0" r="11"/><circle class="dot" cx="52" cy="0" r="11"/><circle class="dot" cx="104" cy="0" r="11"/><circle class="dot" cx="156" cy="0" r="11"/>
      <circle class="dot" cx="0" cy="49" r="11"/><circle class="dot" cx="52" cy="49" r="11"/><circle class="dot" cx="104" cy="49" r="11"/><circle class="dot" cx="156" cy="49" r="11"/>
      <circle class="dot" cx="0" cy="98" r="11"/><circle class="dot" cx="52" cy="98" r="11"/><circle class="dot" cx="104" cy="98" r="11"/><circle class="dot" cx="156" cy="98" r="11"/>
      <circle class="dot" cx="0" cy="147" r="11"/><circle class="dot" cx="52" cy="147" r="11"/><circle class="dot" cx="104" cy="147" r="11"/><circle class="dot" cx="156" cy="147" r="11"/>
    </g>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="46" text-anchor="middle" class="title">한 번의 parameter update에 어떤 데이터를 사용하는가?</text>
  <text x="600" y="76" text-anchor="middle" class="sub">색칠된 점이 현재 step의 gradient 계산에 참여하는 sample이다.</text>
  <g transform="translate(35 105)">
    <rect class="card" width="350" height="470" rx="18"/><text x="175" y="43" text-anchor="middle" class="head">Full Batch</text><text x="175" y="70" text-anchor="middle" class="body">전체 N개 sample</text>
    <g transform="translate(97 112)"><use href="#grid"/><rect x="-18" y="-18" width="192" height="183" rx="15" fill="#667eea" opacity=".22"/><use href="#grid"/></g>
    <path class="arrow" d="M175 296V335"/><rect x="67" y="350" width="216" height="52" rx="12" fill="#eef0ff" stroke="#667eea"/><text x="175" y="382" text-anchor="middle" class="formula">average of N</text><text x="175" y="438" text-anchor="middle" class="body">안정적 · update 비용 큼</text>
  </g>
  <g transform="translate(425 105)">
    <rect class="card" width="350" height="470" rx="18"/><text x="175" y="43" text-anchor="middle" class="head">SGD</text><text x="175" y="70" text-anchor="middle" class="body">무작위 1개 sample</text>
    <g transform="translate(97 112)"><use href="#grid"/><circle class="sgd" cx="104" cy="49" r="14"/></g>
    <path class="arrow" d="M175 296V335"/><rect x="67" y="350" width="216" height="52" rx="12" fill="#fff1eb" stroke="#ef8354"/><text x="175" y="382" text-anchor="middle" class="formula">gradient of 1</text><text x="175" y="438" text-anchor="middle" class="body">빠름 · gradient noise 큼</text>
  </g>
  <g transform="translate(815 105)">
    <rect class="card" width="350" height="470" rx="18"/><text x="175" y="43" text-anchor="middle" class="head">Mini-batch</text><text x="175" y="70" text-anchor="middle" class="body">무작위 B개 sample</text>
    <g transform="translate(97 112)"><use href="#grid"/><circle class="mini" cx="52" cy="0" r="14"/><circle class="mini" cx="104" cy="49" r="14"/><circle class="mini" cx="0" cy="98" r="14"/><circle class="mini" cx="156" cy="98" r="14"/><circle class="mini" cx="52" cy="147" r="14"/></g>
    <path class="arrow" d="M175 296V335"/><rect x="67" y="350" width="216" height="52" rx="12" fill="#eafaf7" stroke="#22a699"/><text x="175" y="382" text-anchor="middle" class="formula">average of B</text><text x="175" y="438" text-anchor="middle" class="body">효율과 안정성의 균형</text>
  </g>
</svg>